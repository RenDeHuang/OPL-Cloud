- name: Configure one OPL Workspace server
  hosts: all
  become: true
  vars:
    workspace_id: "{{ workspace_id }}"
    workspace_slug: "{{ workspace_slug }}"
    workspace_token: "{{ workspace_token }}"
    workspace_domain: "{{ workspace_domain }}"
    opl_image: "{{ opl_image | default('ghcr.io/gaofeng21cn/one-person-lab-webui:latest') }}"
  tasks:
    - name: Ensure Caddy is installed
      ansible.builtin.package:
        name:
          - caddy
        state: present

    - name: Ensure runtime directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/opl-cloud
        - /data/opl
        - /etc/caddy/conf.d

    - name: Write Caddy root config
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        mode: "0644"
        content: |
          {
            admin localhost:2019
          }

          import /etc/caddy/conf.d/*.caddy

    - name: Write Docker Compose file
      ansible.builtin.copy:
        dest: /opt/opl-cloud/docker-compose.yml
        mode: "0644"
        content: |
          services:
            opl:
              image: {{ opl_image }}
              restart: unless-stopped
              environment:
                OPL_WORKSPACE_ID: "{{ workspace_id }}"
                OPL_WORKSPACE_NAME: "{{ workspace_slug }}"
                OPL_SHARE_TOKEN: "{{ workspace_token }}"
                DATA_DIR: /data
                ALLOW_REMOTE: "true"
                OPL_WEBUI_AUTH_MODE: none
                HOME: /data
                OPL_WORKSPACE_ROOT: /data/workspaces
                CODEX_HOME: /data/codex
              ports:
                - "127.0.0.1:3000:3000"
              volumes:
                - /data/opl:/data

    - name: Start OPL Docker runtime
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/opl-cloud
      changed_when: true

    - name: Write Caddy workspace route
      ansible.builtin.template:
        src: Caddyfile.j2
        dest: /etc/caddy/conf.d/opl-workspace.caddy
        mode: "0644"

    - name: Enable and start Caddy
      ansible.builtin.command: systemctl enable --now caddy
      changed_when: true

    - name: Reload Caddy
      ansible.builtin.command: caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
