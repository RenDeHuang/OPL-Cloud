[constraints]
min_quality = 0.60
min_acyclicity = 1.00
max_cycles = 0
max_upward_violations = 0
no_god_files = true

[[layers]]
name = "truth_and_docs"
paths = [
  "docs/*",
  "docs/**/*",
  "packages/contracts/*",
  "packages/contracts/**/*",
  "deploy/*",
  "deploy/**/*",
  "PRODUCT_DESIGN.md",
  "README.md",
  "packages/README.md"
]
order = 6

[[layers]]
name = "frontend"
paths = ["packages/console/ui/*", "packages/console/ui/**/*", "index.html", "vite.config.js"]
order = 1

[[layers]]
name = "api"
paths = ["packages/console/api/*", "packages/console/api/**/*", "packages/console/src/*", "packages/console/src/**/*"]
order = 3

[[layers]]
name = "fabric"
paths = ["packages/fabric/*", "packages/fabric/**/*"]
order = 4

[[layers]]
name = "ledger"
paths = ["packages/ledger/*", "packages/ledger/**/*"]
order = 4

[[layers]]
name = "ops_tools"
paths = ["tools/*", "tools/**/*", ".github/workflows/*", ".github/workflows/**/*"]
order = 2

[[layers]]
name = "verification"
paths = ["tests/*", "tests/**/*", "package.json"]
order = 0

[[boundaries]]
from = "packages/console/api/**/*"
to = "packages/console/ui/**/*"
reason = "API control-plane code must not import Console UI implementation."

[[boundaries]]
from = "packages/console/ui/**/*"
to = "packages/fabric/**/*"
reason = "Console UI must call API routes instead of importing runtime providers."

[[boundaries]]
from = "packages/fabric/**/*"
to = "packages/console/ui/**/*"
reason = "Runtime providers must not depend on UI code."

[[boundaries]]
from = "tools/**/*"
to = "packages/console/ui/**/*"
reason = "Operator tools verify deployed APIs and must not import Console UI implementation."
