name: Pull Request CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pull-request-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: postgres
      PGSSLMODE: disable
      OPL_POSTGRES_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache-dependency-path: |
            services/control-plane/go.sum
            services/fabric/go.sum
            services/ledger/go.sum
            services/internal/postgresmigrate/go.sum

      - name: Install Node dependencies
        run: npm ci --no-audit --no-fund

      - name: Test Node
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test PostgreSQL migrations
        working-directory: services/internal/postgresmigrate
        run: go test -race ./...

      - name: Test Control Plane
        working-directory: services/control-plane
        run: go test ./...

      - name: Test Fabric
        working-directory: services/fabric
        run: go test ./...

      - name: Test Ledger
        working-directory: services/ledger
        run: go test ./...

      - name: Check diff whitespace
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
